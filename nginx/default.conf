# Upstream block — Docker DNS resolves "app" to all replicas
# round-robin is the default algorithm
upstream app_backend {
    server app:8080;
    keepalive 32;          # Reuse connections to backend
}

server {
    listen 80;
    server_name _;

    # Access log with timing info
    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log warn;

    # Tune for ~100 req/s
    keepalive_timeout 65;
    keepalive_requests 1000;

    # Proxy timeouts
    proxy_connect_timeout 5s;
    proxy_read_timeout    30s;
    proxy_send_timeout    30s;

    # Pass real IP to application
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Enable keepalive to upstream
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    location /status {
        proxy_pass http://app_backend;
    }

    location /data {
        proxy_pass http://app_backend;
    }

    # Block direct access to /metrics from outside
    location /metrics {
        deny all;
        return 403;
    }

    # Health check endpoint for load balancers
    location /health {
        access_log off;
        proxy_pass http://app_backend/status;
    }
}

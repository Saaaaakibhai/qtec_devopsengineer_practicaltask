upstream backend_servers {
    # Docker automatically round-robins across all running container replicas of the 'app' service
    server app:8080 max_fails=3 fail_timeout=5s;
}

server {
    listen 80;

    location / {
        proxy_pass http://backend_servers;
        
        # Standard production headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CRITICAL ZERO-DOWNTIME SETTING:
        # If a replica container throws an error or a 502/503/504 because it is booting up, 
        # Nginx will silently pass the request to a healthy replica instantly.
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 5s;
    }
}

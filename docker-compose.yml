version: "3.8"

services:
  app:
    build: ./app
    container_name: qtec-app
    ports:
      - "8080:8080"

  nginx:
    image: nginx:alpine
    container_name: qtec-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

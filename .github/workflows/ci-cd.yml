name: QTEC CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build Go app
        run: |
          cd app
          go mod tidy
          go build -o server main.go

      - name: Run basic test (health check simulation)
        run: |
          echo "Testing build output..."
          test -f app/server

  docker-build:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t qtec-api ./app

      - name: Validate Docker image
        run: |
          docker images | grep qtec-api


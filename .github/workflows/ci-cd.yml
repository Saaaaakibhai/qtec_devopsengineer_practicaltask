name: QTEC CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build Go app
        run: |
          cd app
          go mod tidy
          go build -o server main.go

      - name: Run basic test
        run: |
          test -f app/server

  docker-build-push:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t sakibdevops/qtec-api:latest ./app
          docker tag sakibdevops/qtec-api:latest sakibdevops/qtec-api:${{ github.sha }}

      - name: Push Docker image
        run: |
          docker push sakibdevops/qtec-api:latest
          docker push sakibdevops/qtec-api:${{ github.sha }}

      - name: Verify pushed image
        run: |
          docker images | grep qtec-api
